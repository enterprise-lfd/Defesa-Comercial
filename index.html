    /* ================================================================
       PROJECTION MODEL
       ================================================================ */
    function buildProjection(daily, total, targetVal) {
      if (!daily || daily.length === 0) return null;
      var n = daily.length;
      var avg = total / n;
      var decay = n > 2 ? daily[n - 1] / Math.max(1, daily[0]) : 0.6;
      if (total >= targetVal) {
        var acc = 0;
        for (var i = 0; i < n; i++) {
          acc += daily[i];
          if (acc >= targetVal) return { dias: i + 1, conf: 95, status: "atingido", rate: avg };
        }
      }
      var rate = avg * Math.max(0.25, Math.min(0.9, decay));
      var extra = Math.ceil((targetVal - total) / Math.max(0.5, rate));
      return {
        dias: n + extra,
        conf: Math.round(Math.max(35, Math.min(92, 96 - extra * 0.7))),
        status: "projetado",
        rate: Math.round(rate * 10) / 10
      };
    }

    function buildChartData(daily, total, targetVal, proj) {
      var acc = 0;
      var data = daily.map(function(val, idx) {
        acc += val;
        return { dia: idx + 1, daily: val, cum: acc, tipo: "real" };
      });
      if (!proj || total >= targetVal || proj.status === "atingido") return data;
      var baseLen = daily.length;
      for (var i = 1; i <= proj.dias - baseLen + 3; i++) {
        var r = proj.rate * (0.82 + Math.random() * 0.36);
        acc += r;
        data.push({ dia: baseLen + i, daily: Math.round(r), cum: Math.round(acc), tipo: "proj" });
      }
      return data;
    }

    }

                  <span><span style={{ color: C.muted }}>Total:</span> <strong>{total.toLocaleString("pt-BR")}</strong></span>
                  <span style={{ color: C.border }}>|</span>
                  <span><span style={{ color: C.muted }}>% do total:</span> <strong>{(total / TOTAL_GERAL * 100).toFixed(1)}%</strong></span>
                </React.Fragment>
              )}
            </div>

            {/* TABS */}
            <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
              <PillBtn isActive={activeTab === "chart"} onClick={function() { setActiveTab("chart"); }}>Curva de Captacao</PillBtn>
              <PillBtn isActive={activeTab === "ranking"} onClick={function() { setActiveTab("ranking"); }}>{scope === "regiao" ? "DDDs - " + selectedRegiao : "Ranking por DDD"}</PillBtn>
            </div>

            {/* CHART */}
            {activeTab === "chart" && (
              <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <h3 style={{ margin: 0, fontSize: 15, fontWeight: 400, fontFamily: FONTS.display }}>{viewMode === "acumulado" ? "Curva Acumulada de Respostas" : "Volume Diario de Respostas"}</h3>
                    <p style={{ margin: "1px 0 0", fontSize: 10, color: C.muted }}>{displayLabel}</p>
                  </div>
                  <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                    <PillBtn isActive={viewMode === "acumulado"} onClick={function() { setViewMode("acumulado"); }}>Acumulado</PillBtn>
                    <PillBtn isActive={viewMode === "diario"} onClick={function() { setViewMode("diario"); }}>Diario</PillBtn>
                    <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.sec, cursor: "pointer", marginLeft: 6 }}>
                      <input type="checkbox" checked={showProj} onChange={function(ev) { setShowProj(ev.target.checked); }} style={{ accentColor: C.accent }} />
                      Projecao
                    </label>
                  </div>
                </div>

                {daily.length === 0 ? (
                  <div style={{ padding: 28, textAlign: "center", color: C.muted, fontSize: 12 }}>Sem dados de curva para esta selecao.</div>
                ) : (
                  <ResponsiveContainer width="100%" height={300}>
                    {viewMode === "acumulado" ? (
                      <ComposedChart data={chartData} margin={{ top: 5, right: 10, left: 0, bottom: 5 }}>
                        <defs>
                          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={activeColor} stopOpacity={0.12} />
                            <stop offset="100%" stopColor={activeColor} stopOpacity={0.01} />
                          </linearGradient>
                        </defs>
                        <CartesianGrid strokeDasharray="3 3" stroke="#EDF0F3" vertical={false} />
                        <XAxis dataKey="dia" tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                        <YAxis tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} tickFormatter={function(v) { return v >= 1000 ? (v / 1000).toFixed(1) + "k" : v; }} />
                        <Tooltip content={<ChartTip />} />
                        <ReferenceLine y={target} stroke={C.danger} strokeDasharray="6 3" strokeWidth={1.5} label={{ value: "Meta: " + target, position: "insideTopRight", fontSize: 10, fill: C.danger, fontWeight: 600 }} />
                        <Area dataKey="cum" fill="url(#areaGrad)" stroke={activeColor} strokeWidth={2} dot={false} name="Acumulado" activeDot={{ r: 3, stroke: "#fff", strokeWidth: 2 }} />
                      </ComposedChart>
                    ) : (
                      <BarChart data={chartData} margin={{ top: 5, right: 10, left: 0, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#EDF0F3" vertical={false} />
                        <XAxis dataKey="dia" tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                        <YAxis tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} />
                        <Tooltip content={<ChartTip />} />
                        <Bar dataKey="daily" name="Respostas" radius={[2, 2, 0, 0]}>
                          {chartData.map(function(entry, idx) {
                            return <Cell key={idx} fill={entry.tipo === "proj" ? "rgba(194,122,14,0.35)" : activeColor} opacity={entry.tipo === "proj" ? 0.6 : 0.85} />;
                          })}
                        </Bar>
                      </BarChart>
                    )}
                  </ResponsiveContainer>
                )}

                {showProj && projection && projection.status === "projetado" && (
                  <div style={{ marginTop: 8, padding: "8px 11px", background: "#FFF8ED", border: "1px solid #F5DEB0", borderRadius: 4, fontSize: 10, color: "#92610E", lineHeight: 1.6 }}>
                    <strong>Projecao:</strong> Taxa estimada de <strong>{projection.rate} resp./dia</strong> - meta de {target.toLocaleString("pt-BR")} em ~<strong>{projection.dias} dias</strong> (confianca: {projection.conf}%).
                  </div>
                )}
                {projection && projection.status === "atingido" && (
                  <div style={{ marginTop: 8, padding: "8px 11px", background: C.accentLight, border: "1px solid #C3E0D1", borderRadius: 4, fontSize: 10, color: C.accent, lineHeight: 1.6 }}>
                    <strong>Meta atingida!</strong> Alcancou {target.toLocaleString("pt-BR")} respostas no <strong>dia {projection.dias}</strong>.
                  </div>
                )}
              </div>
            )}

            {/* RANKING */}
            {activeTab === "ranking" && (
              <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: 16 }}>
                <h3 style={{ margin: "0 0 2px", fontSize: 15, fontWeight: 400, fontFamily: FONTS.display }}>
                  {scope === "regiao" ? "DDDs da regiao " + selectedRegiao : "Ranking Geral por DDD"}
                </h3>
                <p style={{ margin: "0 0 10px", fontSize: 10, color: C.muted }}>Meta: {target.toLocaleString("pt-BR")} respostas - {ranking.length} DDDs</p>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                    <thead>
                      <tr style={{ borderBottom: "2px solid " + C.border }}>
                        {["#", "DDD", "Cidade", "UF", "Regiao", "Media/dia", "Total", "Dias", "Conf."].map(function(h, i) {
                          return <th key={i} style={{ padding: "5px 7px", textAlign: i > 4 ? "right" : "left", fontSize: 9, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", color: C.muted }}>{h}</th>;
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {ranking.map(function(row, idx) {
                        var isSelected = row.ddd === selectedDdd && scope === "ddd";
                        return (
                          <tr key={row.ddd}
                            onClick={function() { setSelectedDdd(row.ddd); setScope("ddd"); setActiveTab("chart"); }}
                            style={{ borderBottom: "1px solid " + C.border, background: isSelected ? C.accentLight : "transparent", cursor: "pointer" }}
                            onMouseEnter={function(ev) { if (!isSelected) ev.currentTarget.style.background = "#F9FAFB"; }}
                            onMouseLeave={function(ev) { if (!isSelected) ev.currentTarget.style.background = "transparent"; }}
                          >
                            <td style={{ padding: "6px 7px", fontFamily: FONTS.mono, fontSize: 9.5, color: C.muted, fontWeight: 600 }}>{idx + 1}</td>
                            <td style={{ padding: "6px 7px" }}>
                              <span style={{ background: isSelected ? C.accent : "#F1F3F5", color: isSelected ? "#fff" : C.text, padding: "1px 6px", borderRadius: 3, fontFamily: FONTS.mono, fontSize: 10, fontWeight: 600 }}>{row.ddd}</span>
                            </td>
                            <td style={{ padding: "6px 7px", fontWeight: 500 }}>{row.cidade}</td>
                            <td style={{ padding: "6px 7px", color: C.muted }}>{row.estado}</td>
                            <td style={{ padding: "6px 7px" }}><span style={{ color: REG_COLORS[row.regiao], fontWeight: 500, fontSize: 10 }}>{row.regiao}</span></td>
                            <td style={{ padding: "6px 7px", textAlign: "right", fontFamily: FONTS.mono, fontSize: 10 }}>{row.avg}</td>
                            <td style={{ padding: "6px 7px", textAlign: "right", fontFamily: FONTS.mono, fontSize: 10 }}>{row.total.toLocaleString("pt-BR")}</td>
                            <td style={{ padding: "6px 7px", textAlign: "right" }}>
                              <span style={{ fontFamily: FONTS.mono, fontSize: 10, fontWeight: 700, color: row.status === "atingido" ? C.accent : row.dias <= 20 ? C.warn : C.danger }}>{row.dias}d</span>
                            </td>
                            <td style={{ padding: "6px 7px", textAlign: "right" }}>
                              <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 4 }}>
                                <div style={{ width: 34, height: 3.5, background: "#F1F3F5", borderRadius: 2, overflow: "hidden" }}>
                                  <div style={{ height: "100%", width: row.conf + "%", background: row.conf > 75 ? C.accent : row.conf > 50 ? C.warn : C.danger, borderRadius: 2 }} />
                                </div>
                                <span style={{ fontFamily: FONTS.mono, fontSize: 9, color: C.muted, minWidth: 22 }}>{row.conf}%</span>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* METHODOLOGY */}
            <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: "12px 16px", marginTop: 14 }}>
              <h4 style={{ margin: "0 0 5px", fontSize: 12, fontWeight: 400, fontFamily: FONTS.display }}>Metodologia</h4>
              <p style={{ margin: 0, fontSize: 10, color: C.sec, lineHeight: 1.65 }}>
                Dados consolidados por DDD (independente de pesquisa). Taxa diaria calculada sobre dias ativos de coleta.
                Projecao baseada na media ajustada pelo fator de decaimento (D1 a Dn). Regioes agregam todos os DDDs de
                seus estados conforme IBGE. Base: <strong>2.842 respostas</strong>, <strong>64 DDDs</strong>,
                <strong> 5 regioes</strong>, periodo 18/Fev - 25/Mar 2026.
              </p>
            </div>

            <div style={{ textAlign: "center", padding: "10px 0 20px", fontSize: 9, color: C.muted, letterSpacing: "0.04em" }}>
              TERRA SALES - ANALISE ESTATISTICA - v2.1 - Base atualizada
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
